<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 异象中学学生信息管理系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-brand">
        <h1 class="brand-title" style="font-size: 2.5rem; line-height: 1.3;">
            异象中学<br>
            学生信息管理系统
        </h1>
        <p class="brand-desc" style="font-size: 0.95rem; line-height: 1.6; margin-top: 1.5rem;">
            <span style="display: block; margin: 0.5rem 0;"> 学籍档案 | 成绩查询 | 奖惩记录</span>
            <span style="display: block; margin: 0.5rem 0;"> 统一身份认证 | 分级权限管理</span>
            <span style="display: block; margin: 1rem 0 0.5rem; font-size: 0.85rem; opacity: 0.7;">
      系统维护：教务处
    </span>
        </p>
    </div>

    <div class="login-form-container">
        <div style="width: 100%; max-width: 360px;">
            <h2 style="margin-bottom: 2rem; font-size: 1.8rem;">欢迎回来</h2>
            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" class="input-field" placeholder=" " autocomplete="off" required>
                    <label for="username" class="input-label">教务账号</label>
                </div>
                
                <div class="input-group">
                    <div style="position: relative; width: 100%;">
                        <input type="password" id="password" class="input-field" placeholder=" " style="padding-right: 3rem;" required>
                        <label for="password" class="input-label">密码</label>
                        <button type="button" id="togglePassword" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0.25rem; display: flex; align-items: center; justify-content: center; transition: color 0.2s; z-index: 10;" title="显示/隐藏密码">
                            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn" style="width: 100%; justify-content: center;">
                    登 录 系统
                </button>
            </form>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="../tools/decrypt-lib.js"></script>
<script src="../tools/config-switch.js"></script>
<script src="school-config.encrypted.js"></script>
<script src="school-config.js"></script>

<script>
(async function() {
    // 配置加载逻辑保持不变
    try {
        window.SchoolSystemConfig = await loadConfig('SchoolSystemConfig', 'ENCRYPTED_SCHOOL_CONFIG', './school-config.js');
    } catch (error) {
        showToast('配置加载失败，请检查网络', true);
    }

    // 密码显示/隐藏切换
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');
    
    if (toggleBtn) {
        toggleBtn.addEventListener('click', function() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
                toggleBtn.style.color = '#3b82f6';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
                toggleBtn.style.color = 'var(--text-muted)';
            }
        });
        
        toggleBtn.addEventListener('mouseenter', function() {
            if (passwordInput.type === 'password') {
                toggleBtn.style.color = 'var(--text-main)';
            }
        });
        
        toggleBtn.addEventListener('mouseleave', function() {
            if (passwordInput.type === 'password') {
                toggleBtn.style.color = 'var(--text-muted)';
            }
        });
    }

    // 现代化的 Toast 提示函数
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast show ${isError ? 'error' : ''}`;
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        
        const account = SchoolSystemConfig.accounts.find(acc => acc.id === user && acc.password === pass);
        
        if(account) {
            // 登录成功逻辑
            sessionStorage.setItem('schoolSystem_user', account.id);
            sessionStorage.setItem('schoolSystem_type', account.accountType);
            window.location.href = 'dashboard.html'; // 指向新的主页
        } else {
            showToast('账号或密码不正确，请重试', true);
        }
    });
})();
</script>
</body>
</html>
