<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 异象中学学生实名通讯系统</title>
<link rel="stylesheet" href="chat-style.css">
<style>
/* 登录页专用样式补充 */
.login-wrapper { display: flex; height: 100vh; width: 100%; }
.login-brand { 
    flex: 1; background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%); 
    color: white; padding: 4rem; display: flex; flex-direction: column; justify-content: center; 
}
.login-form-container { flex: 1; display: flex; align-items: center; justify-content: center; background: white; }
.brand-title { font-size: 3.5rem; font-weight: 800; margin-bottom: 1rem; }
</style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-brand">
    <div class="brand-title">异象中学<br>学生实名通讯系统 </div>
      <div style="font-size: 0.95rem; opacity: 0.85; margin-top: 1.5rem; line-height: 1.6;">
          <p style="margin: 0.5rem 0;"> 本系统采用实名认证，所有聊天记录将被保存</p>
          <p style="margin: 0.5rem 0;">️ 请自觉遵守《学生网络行为管理条例》</p>
          <p style="margin: 0.5rem 0; font-size: 0.85rem; opacity: 0.7;">
              系统版本：v2.3.1 | 技术支持：校信息中心
          </p>
      </div>
  </div>

  <div class="login-form-container">
    <div style="width: 100%; max-width: 360px; padding: 2rem;">
      <h2 style="margin-bottom: 2rem; font-size: 1.8rem; font-weight: 700;">账号登录</h2>
      
      <form id="loginForm">
        <div style="margin-bottom: 1.5rem;">
          <label style="display:block; margin-bottom:0.5rem; font-weight:600; color:var(--text-muted); font-size:0.9rem;">账号</label>
          <input type="text" id="username" class="input-field" style="margin:0" placeholder="请输入校园账号" required>
        </div>
        
        <div style="margin-bottom: 2rem;">
          <label style="display:block; margin-bottom:0.5rem; font-weight:600; color:var(--text-muted); font-size:0.9rem;">密码</label>
          <div style="position: relative;">
            <input type="password" id="password" class="input-field" style="margin:0; padding-right: 3rem;" placeholder="••••••••" required>
            <button type="button" id="togglePassword" style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0.25rem; display: flex; align-items: center; justify-content: center; transition: color 0.2s;" title="显示/隐藏密码">
              <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem;">
          进入聊天
        </button>
        
        <div id="errorMsg" style="display:none; margin-top:1rem; padding:0.75rem; background:#fef2f2; color:#ef4444; border-radius:0.5rem; text-align:center; font-size:0.9rem;">
          账号或密码错误
        </div>
      </form>
    </div>
  </div>
</div>

<script src="../tools/decrypt-lib.js"></script>
<script src="../tools/config-switch.js"></script>
<script src="config.encrypted.js"></script>
<script src="config.js"></script>

<script>
(async function() {
  try {
    window.ChatConfig = await loadConfig('ChatConfig', 'ENCRYPTED_CHAT_CONFIG', './config.js');
  } catch (error) {
    console.error("配置加载失败", error);
    return;
  }

  // 密码显示/隐藏切换
  const passwordInput = document.getElementById('password');
  const toggleBtn = document.getElementById('togglePassword');
  const eyeIcon = document.getElementById('eyeIcon');
  
  if (toggleBtn) {
    toggleBtn.addEventListener('click', function() {
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        `;
        toggleBtn.style.color = '#7c3aed';
      } else {
        passwordInput.type = 'password';
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        `;
        toggleBtn.style.color = 'var(--text-muted)';
      }
    });
    
    toggleBtn.addEventListener('mouseenter', function() {
      if (passwordInput.type === 'password') {
        toggleBtn.style.color = 'var(--text-main)';
      }
    });
    
    toggleBtn.addEventListener('mouseleave', function() {
      if (passwordInput.type === 'password') {
        toggleBtn.style.color = 'var(--text-muted)';
      }
    });
  }

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');
    
    const account = ChatConfig.accounts.find(acc => acc.id === user && acc.password === pass);
    
    if (account) {
      sessionStorage.setItem('currentUser', account.id);
      sessionStorage.setItem('displayName', account.displayName);
      window.location.href = 'chat.html';
    } else {
      err.style.display = 'block';
      setTimeout(()=>err.style.display='none', 3000);
    }
  });
})();
</script>
</body>
</html>
